<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>MarkItDown</title>
<meta name="theme-color" content="#0b0b0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MarkItDown">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
  <h1>MarkItDown</h1>
  <nav>
    <button class="tab active" data-tab="convert" data-i18n="tabConvert">Конвертировать</button>
    <button class="tab" data-tab="archive" data-i18n="tabArchive">Архив</button>
  </nav>
</header>
<main>
  <section id="convert" class="view active">
    <label id="dropzone" for="file-input">
      <span id="dz-text" data-i18n="dropzoneHint">Нажми или перетащи файл сюда</span>
      <input id="file-input" type="file" hidden multiple>
    </label>
    <div id="status"></div>
    <div id="result" hidden>
      <div class="result-toolbar">
        <span id="result-name"></span>
        <div class="view-toggle">
          <button id="preview-toggle-btn" class="toggle-btn active" data-i18n="previewBtn">Просмотр</button>
          <button id="source-toggle-btn" class="toggle-btn" data-i18n="sourceBtn">Исходник</button>
        </div>
        <div class="btns">
          <button id="download-btn" data-i18n="downloadBtn">Скачать .md</button>
          <button id="copy-btn" data-i18n="copyBtn">Копировать</button>
        </div>
      </div>
      <div id="result-preview" class="markdown-body"></div>
      <textarea id="result-text" readonly hidden></textarea>
    </div>
    <div id="batch-result" hidden>
      <ul id="batch-list"></ul>
      <div id="batch-summary"></div>
      <button id="download-zip-btn" hidden data-i18n="downloadZip">Скачать всё ZIP</button>
    </div>
  </section>
  <section id="archive" class="view">
    <input id="search" type="search" data-i18n-placeholder="searchPlaceholder" placeholder="Поиск по названию…">
    <ul id="archive-list"></ul>
    <p class="hint"><a href="/cert" data-i18n="certHint">Установить сертификат (для iOS, один раз)</a></p>
  </section>
</main>
<script src="/static/vendor/marked.min.js"></script>
<script src="/static/vendor/purify.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
