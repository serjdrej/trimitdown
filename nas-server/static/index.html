<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>TrimItDown</title>
<meta name="theme-color" content="#1B1A17">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TrimItDown">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
  <div class="wordmark"><span class="wm-bold">trimit</span><span class="wm-light">down</span></div>
</header>
<main>
  <section id="convert" class="view active">
    <div id="status"></div>
    <div id="result" hidden>
      <div class="result-toolbar">
        <span id="result-name"></span>
        <div class="view-toggle">
          <button id="preview-toggle-btn" class="toggle-btn active" data-i18n="previewBtn">Просмотр</button>
          <button id="source-toggle-btn" class="toggle-btn" data-i18n="sourceBtn">Исходник</button>
        </div>
      </div>
      <div class="result-card">
        <div id="result-preview" class="markdown-body"></div>
        <textarea id="result-text" class="markdown-body" readonly hidden></textarea>
        <div class="result-card-actions">
          <button id="download-btn"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg><span data-i18n="downloadBtn">Скачать .md</span></button>
          <button id="copy-btn"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg><span data-i18n="copyBtn">Копировать</span></button>
        </div>
      </div>
      <div id="token-info" class="token-info" hidden>
        <div class="token-info-row">
          <span id="token-detail" class="token-detail"></span>
          <span id="token-savings" class="token-savings"></span>
        </div>
        <div class="token-bar"><div id="token-bar-fill" class="token-bar-fill"></div></div>
      </div>
    </div>
    <div id="batch-result" hidden>
      <ul id="batch-list"></ul>
      <div id="batch-summary"></div>
      <button id="download-zip-btn" hidden data-i18n="downloadZip">Скачать всё ZIP</button>
    </div>
    <label id="dropzone" for="file-input">
      <span id="dz-text" data-i18n="dropzoneHint">Нажми или перетащи файл сюда</span>
      <input id="file-input" type="file" hidden multiple>
    </label>
  </section>
  <section id="archive" class="view">
    <input id="search" type="search" data-i18n-placeholder="searchPlaceholder" placeholder="Поиск по названию…">
    <ul id="archive-list"></ul>
  </section>
  <section id="settings" class="view">
    <div class="settings-row">
      <span data-i18n="modeLabel">Режим</span>
      <span id="mode-badge" class="badge"></span>
    </div>
    <div class="settings-group" id="server-url-group" hidden>
      <label class="settings-label" for="server-url-input" data-i18n="serverUrlLabel">Адрес сервера</label>
      <input id="server-url-input" type="text" placeholder="https://192.168.1.10:8002">
      <div class="settings-actions">
        <button id="save-server-btn" data-i18n="saveBtn">Сохранить</button>
        <button id="test-server-btn" data-i18n="testConnectionBtn">Проверить соединение</button>
        <button id="reset-server-btn" data-i18n="resetLocalBtn">Сбросить на локальный режим</button>
      </div>
      <p id="server-status-msg" class="hint"></p>
    </div>
    <div class="settings-row">
      <span data-i18n="themeLabel">Тема</span>
      <div class="settings-theme">
        <select disabled>
          <option data-i18n="themeSystem">Системная</option>
          <option data-i18n="themeLight">Светлая</option>
          <option data-i18n="themeDark">Тёмная</option>
        </select>
        <span class="badge" data-i18n="comingSoon">скоро</span>
      </div>
    </div>
    <p class="hint" id="cert-hint"><a href="/cert" data-i18n="certHint">Установить сертификат (для iOS, один раз)</a></p>
    <p class="hint"><a href="/static/privacy.html" data-i18n="privacyHint">Приватность и хранение данных</a></p>
    <p class="hint" id="app-version"></p>
  </section>
</main>
<nav class="bottom-nav">
  <button class="tab active" data-tab="convert" data-i18n-aria="tabConvert">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m17 8-5-5-5 5"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/></svg>
  </button>
  <button class="tab" data-tab="archive" data-i18n-aria="tabArchive">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="5" x="2" y="3" rx="1"/><path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8"/><path d="M10 12h4"/></svg>
  </button>
  <button class="tab" data-tab="settings" data-i18n-aria="tabSettings">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/><circle cx="12" cy="12" r="3"/></svg>
  </button>
</nav>
<script src="/static/vendor/marked.min.js"></script>
<script src="/static/vendor/purify.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
