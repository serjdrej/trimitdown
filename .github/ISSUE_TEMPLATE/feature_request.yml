name: Feature request
description: An idea for a new capability or an improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the situation where you miss this feature.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How do you imagine it working? Alternatives you've considered are welcome too.
    validations:
      required: true
