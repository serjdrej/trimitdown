name: Build macOS app

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-15-intel
            arch: x86_64
          - runner: macos-14
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      # The iconset is derived from mac-build/icon_master_1024.png and is not
      # committed; Pillow arrives transitively with pdfplumber.
      - name: Generate iconset
        run: python generate_iconset.py

      - name: Build .icns from iconset
        run: iconutil -c icns mac-build/AppIcon.iconset -o mac-build/AppIcon.icns

      - name: Build app with PyInstaller
        env:
          PYI_TARGET_ARCH: ${{ matrix.arch }}
        run: pyinstaller main.spec

      # A green build proves nothing about what is inside the bundle: a missing
      # module produces an app that starts fine and fails on the first PDF. Same
      # check the tiktoken_ext regression needed. Path is explicit -- PyInstaller
      # names the build directory after the spec, and a stale build/<other>/ dir
      # would make a glob answer for the wrong build.
      - name: Verify the PDF engine is in the bundle
        run: |
          grep -q "trimitdown_pdf" build/main/Analysis-00.toc \
            || { echo "trimitdown_pdf missing from the bundle"; exit 1; }

      - name: Zip .app bundle
        run: ditto -c -k --sequesterRsrc --keepParent dist/TrimItDown.app TrimItDown-macOS-${{ matrix.arch }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: TrimItDown-macOS-${{ matrix.arch }}
          path: TrimItDown-macOS-${{ matrix.arch }}.zip
