name: Build macOS app

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build .icns from iconset
        run: iconutil -c icns mac-build/AppIcon.iconset -o mac-build/AppIcon.icns

      - name: Build app with PyInstaller
        run: >
          pyinstaller --onefile --windowed --name MarkItDown
          --icon mac-build/AppIcon.icns
          --add-data "static:static"
          --collect-all markitdown
          --collect-all magika
          --collect-all mammoth
          --collect-all pdfminer
          --collect-all pptx
          --collect-all openpyxl
          --collect-all xlrd
          --collect-all olefile
          --collect-all bs4
          --collect-all lxml
          main.py

      - name: Zip .app bundle
        run: ditto -c -k --sequesterRsrc --keepParent dist/MarkItDown.app MarkItDown-macOS.zip

      - uses: actions/upload-artifact@v4
        with:
          name: MarkItDown-macOS
          path: MarkItDown-macOS.zip
