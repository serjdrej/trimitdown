name: Build macOS app

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-15-intel
            arch: x86_64
          - runner: macos-14
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build .icns from iconset
        run: iconutil -c icns mac-build/AppIcon.iconset -o mac-build/AppIcon.icns

      - name: Build app with PyInstaller
        env:
          PYI_TARGET_ARCH: ${{ matrix.arch }}
        run: pyinstaller main.spec

      - name: Zip .app bundle
        run: ditto -c -k --sequesterRsrc --keepParent dist/TrimItDown.app TrimItDown-macOS-${{ matrix.arch }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: TrimItDown-macOS-${{ matrix.arch }}
          path: TrimItDown-macOS-${{ matrix.arch }}.zip
