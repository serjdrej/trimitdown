<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>MarkItDown</title>
<meta name="theme-color" content="#0b0b0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MarkItDown">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
  <h1>MarkItDown <span id="mode-badge" class="badge"></span></h1>
  <nav>
    <button class="tab active" data-tab="convert">Конвертировать</button>
    <button class="tab" data-tab="archive">Архив</button>
  </nav>
</header>
<main>
  <section id="convert" class="view active">
    <label id="dropzone" for="file-input">
      <span id="dz-text">Нажми или перетащи файл сюда</span>
      <input id="file-input" type="file" hidden>
    </label>
    <div id="status"></div>
    <div id="result" hidden>
      <div class="result-toolbar">
        <span id="result-name"></span>
        <div class="btns">
          <button id="download-btn">Скачать .md</button>
          <button id="copy-btn">Копировать</button>
        </div>
      </div>
      <textarea id="result-text" readonly></textarea>
    </div>
  </section>
  <section id="archive" class="view">
    <input id="search" type="search" placeholder="Поиск по названию…">
    <ul id="archive-list"></ul>
    <p class="hint"><a href="/cert">Установить сертификат (для iOS, один раз)</a></p>
  </section>
</main>
<script src="/static/app.js"></script>
</body>
</html>
